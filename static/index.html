<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Support Automation — Live Console</title>
<style>
  :root{
    --bg: #0F1417;
    --panel: #161D22;
    --panel-2: #1D262C;
    --line: #2A353C;
    --text: #E7EEF1;
    --muted: #8FA3AC;
    --accent: #4FD1C5;
    --accent-2: #F2A65A;
    --danger: #E8685F;
    --ok: #6FCF97;
    --mono: 'SF Mono', 'Fira Code', Consolas, monospace;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    min-height:100vh;
  }
  header{
    padding:28px 36px 20px; border-bottom:1px solid var(--line);
    display:flex; align-items:baseline; justify-content:space-between; flex-wrap:wrap; gap:12px;
  }
  header h1{ font-size:19px; font-weight:600; margin:0; letter-spacing:.2px; }
  header h1 span{ color:var(--accent); }
  .status{ font-family:var(--mono); font-size:12px; color:var(--muted); }
  .status b{ color:var(--accent-2); }
  main{ max-width:1180px; margin:0 auto; padding:28px 36px 60px; display:grid; grid-template-columns:1fr; gap:22px;}
  @media(min-width:920px){ main{ grid-template-columns: 1.1fr 1.4fr; } }

  .card{ background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:20px; }
  .card h2{ font-size:13px; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin:0 0 14px; font-weight:600;}

  textarea, input[type=text]{
    width:100%; background:var(--panel-2); border:1px solid var(--line); color:var(--text);
    border-radius:8px; padding:10px 12px; font-size:14px; font-family:inherit; resize:vertical;
  }
  textarea{ min-height:110px; margin-top:8px;}
  label{ font-size:12px; color:var(--muted); }
  .row{ margin-bottom:14px; }

  button{
    background:var(--accent); color:#08201D; border:none; border-radius:8px;
    padding:10px 18px; font-weight:600; font-size:14px; cursor:pointer;
  }
  button:hover{ filter:brightness(1.08); }
  button:disabled{ opacity:.5; cursor:not-allowed; }
  button.ghost{
    background:transparent; border:1px solid var(--line); color:var(--text); font-weight:500;
  }

  .samples{ display:flex; flex-direction:column; gap:6px; max-height:220px; overflow-y:auto; margin-top:6px;}
  .sample-item{
    font-family:var(--mono); font-size:12.5px; color:var(--muted); text-align:left;
    background:var(--panel-2); border:1px solid var(--line); border-radius:6px; padding:8px 10px; cursor:pointer;
  }
  .sample-item:hover{ border-color:var(--accent); color:var(--text); }

  .result{ display:none; }
  .result.show{ display:block; }
  .badge-row{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px;}
  .badge{
    font-family:var(--mono); font-size:11.5px; padding:4px 10px; border-radius:999px;
    border:1px solid var(--line); color:var(--muted);
  }
  .badge.category{ color:var(--accent); border-color:var(--accent); }
  .badge.urgency-high{ color:var(--danger); border-color:var(--danger); }
  .badge.urgency-medium{ color:var(--accent-2); border-color:var(--accent-2); }
  .badge.urgency-low{ color:var(--ok); border-color:var(--ok); }
  .badge.escalate{ background:var(--danger); color:#2A0C0A; border-color:var(--danger); font-weight:700;}
  .badge.auto{ background:var(--ok); color:#0A2A17; border-color:var(--ok); font-weight:700;}

  .kb-list{ display:flex; flex-direction:column; gap:6px; margin-bottom:16px; }
  .kb-item{ font-family:var(--mono); font-size:12px; color:var(--muted); }
  .kb-item b{ color:var(--text); }

  .response-box{
    background:var(--panel-2); border:1px solid var(--line); border-radius:8px;
    padding:14px 16px; font-size:14px; line-height:1.55; white-space:pre-wrap;
  }
  .meta{ margin-top:14px; font-family:var(--mono); font-size:11px; color:var(--muted); }
  .placeholder{ color:var(--muted); font-size:13.5px; }
  .footer-note{ margin-top:22px; font-size:12px; color:var(--muted); text-align:center; }
</style>
</head>
<body>

<header>
  <h1>Support<span>Auto</span> — Live Console</h1>
  <div class="status" id="statusLine">checking system status…</div>
</header>

<main>
  <section class="card">
    <h2>Submit a ticket</h2>
    <div class="row">
      <label>Subject</label>
      <input type="text" id="subjectInput" placeholder="e.g. Charged twice for my order" />
    </div>
    <div class="row">
      <label>Message</label>
      <textarea id="messageInput" placeholder="Paste or type the customer's message…"></textarea>
    </div>
    <button id="processBtn">Process Ticket →</button>

    <div class="row" style="margin-top:22px;">
      <label>Or try a sample ticket</label>
      <div class="samples" id="sampleList"><div class="placeholder">Loading samples…</div></div>
    </div>
  </section>

  <section class="card">
    <h2>Agent output</h2>
    <div class="placeholder" id="emptyState">Submit or select a ticket to see the agent's classification, retrieved knowledge, and drafted response.</div>

    <div class="result" id="resultBox">
      <div class="badge-row" id="badgeRow"></div>
      <div class="kb-list" id="kbList"></div>
      <label>Drafted response</label>
      <div class="response-box" id="responseBox"></div>
      <div class="meta" id="metaLine"></div>
    </div>
  </section>
</main>

<div class="footer-note">Customer Support Automation POC · classification + RAG + agentic escalation logic</div>

<script>
const API = "";

async function loadStatus(){
  try{
    const res = await fetch(API + "/health");
    const data = await res.json();
    document.getElementById("statusLine").innerHTML =
      `provider: <b>${data.llm_provider}</b> · embeddings: <b>${data.embedding_backend}</b>`;
  }catch(e){
    document.getElementById("statusLine").textContent = "API not reachable";
  }
}

async function loadSamples(){
  try{
    const res = await fetch(API + "/api/tickets/sample");
    const tickets = await res.json();
    const list = document.getElementById("sampleList");
    list.innerHTML = "";
    tickets.forEach(t => {
      const div = document.createElement("div");
      div.className = "sample-item";
      div.textContent = `${t.id} — ${t.subject}`;
      div.onclick = () => {
        document.getElementById("subjectInput").value = t.subject;
        document.getElementById("messageInput").value = t.message;
      };
      list.appendChild(div);
    });
  }catch(e){
    document.getElementById("sampleList").innerHTML = '<div class="placeholder">Could not load samples.</div>';
  }
}

function urgencyClass(u){
  return u === "high" ? "urgency-high" : u === "medium" ? "urgency-medium" : "urgency-low";
}

async function processTicket(){
  const subject = document.getElementById("subjectInput").value.trim();
  const message = document.getElementById("messageInput").value.trim();
  if(!message){ alert("Please enter a message."); return; }

  const btn = document.getElementById("processBtn");
  btn.disabled = true; btn.textContent = "Processing…";

  try{
    const res = await fetch(API + "/api/ticket/process", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ticket_id: "T-DEMO", subject, message})
    });
    const data = await res.json();

    document.getElementById("emptyState").style.display = "none";
    const box = document.getElementById("resultBox");
    box.classList.add("show");

    const c = data.classification;
    document.getElementById("badgeRow").innerHTML = `
      <span class="badge category">${c.category}</span>
      <span class="badge ${urgencyClass(c.urgency)}">${c.urgency} urgency</span>
      <span class="badge">${c.sentiment}</span>
      <span class="badge">${(c.confidence*100).toFixed(0)}% confidence</span>
      <span class="badge ${data.escalate ? 'escalate' : 'auto'}">${data.escalate ? 'ESCALATE TO HUMAN' : 'AUTO-RESOLVED'}</span>
    `;

    const kbList = document.getElementById("kbList");
    if(data.retrieved_articles.length){
      kbList.innerHTML = "<label>Retrieved knowledge</label><br/>" + data.retrieved_articles.map(a =>
        `<div class="kb-item">→ <b>${a.title}</b> (match score ${a.score})</div>`
      ).join("");
    } else {
      kbList.innerHTML = '<div class="kb-item">No matching knowledge-base article found.</div>';
    }

    document.getElementById("responseBox").textContent = data.draft_response;
    document.getElementById("metaLine").textContent =
      `generation: ${data.generation_method}` + (data.escalate ? ` · reason: ${data.escalation_reason}` : "");
  }catch(e){
    alert("Error processing ticket. Is the API running?");
  }finally{
    btn.disabled = false; btn.textContent = "Process Ticket →";
  }
}

document.getElementById("processBtn").addEventListener("click", processTicket);
loadStatus();
loadSamples();
</script>

</body>
</html>
